name: thorvg
description: ThorVG Flutter Runtime
version: 1.0.0-pre.21
repository: https://github.com/thorvg/thorvg.flutter
homepage: https://thorvg.org

environment:
  sdk: '>=3.2.4 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  ffi: ^2.1.2
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  ffigen: ^9.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      web:
        pluginClass: ThorvgFlutterWeb
        fileName: src/web/thorvg_flutter_web.dart
